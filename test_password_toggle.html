<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Password Toggle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-input {
            width: 100%;
            padding: 10px 45px 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        .input-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 5px;
        }
        .password-toggle:hover {
            color: #495057;
        }
    </style>
</head>
<body>
    <h1>Test Password Toggle Functionality</h1>

    <div class="form-group">
        <label>Test Password Field:</label>
        <div class="input-wrapper">
            <input type="password" id="testPassword" class="form-input" placeholder="Enter password" value="testpassword123">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('testPassword')">
                <i class="fas fa-eye" id="testPasswordIcon"></i>
            </button>
        </div>
    </div>

    <div class="form-group">
        <label>Test Password Field 2:</label>
        <div class="input-wrapper">
            <input type="password" id="testPassword2" class="form-input" placeholder="Enter another password" value="anotherpassword">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('testPassword2')">
                <i class="fas fa-eye" id="testPassword2Icon"></i>
            </button>
        </div>
    </div>

    <script>
    function togglePasswordVisibility(passwordId) {
        const passwordInput = document.getElementById(passwordId);
        const icon = document.getElementById(passwordId + 'Icon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
    </script>

    <p><strong>Instructions:</strong> Click the eye icon to toggle password visibility. The icon should change from eye to eye-slash and the password should become visible/hidden.</p>
</body>
</html>
